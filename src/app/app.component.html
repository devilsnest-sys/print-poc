<main class="shell">
  <section class="toolbar" aria-label="Document tools">
    <div class="document-meta">
      <span class="eyebrow">Document viewer</span>
      <h1>{{ documentTitle }}</h1>
      <p>{{ documentKind }} document is open in view mode inside the app.</p>
    </div>

    <div class="actions">
      <label class="file-picker">
        <input type="file" accept="application/pdf,image/*,text/plain,text/csv,text/markdown" (change)="openFile($event)">
        Open document
      </label>
      <button type="button" class="secondary" (click)="loadSampleDocument()">Sample</button>
      <button type="button" class="primary" (click)="printDocument()">Print</button>
    </div>
  </section>

  <p class="error" *ngIf="errorMessage" role="alert">{{ errorMessage }}</p>

  <section class="viewer-panel" aria-label="Document preview">
    <iframe
      id="documentFrame"
      title="Document preview"
      [src]="documentUrl">
    </iframe>
  </section>
</main>
