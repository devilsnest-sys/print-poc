<main class="shell">
  <section class="toolbar" aria-label="Document tools">
    <div class="document-meta">
      <span class="eyebrow">JSON to printable PDF</span>
      <h1>{{ documentTitle }}</h1>
      <p>No source file is opened. Content, layout, page setup, and styles are generated dynamically from JSON.</p>
    </div>

    <div class="actions">
      <button type="button" class="secondary" (click)="generateDocumentFromJson()">Regenerate from JSON</button>
      <button type="button" class="secondary" (click)="openDocumentInNewTab()">Preview tab</button>
      <button type="button" class="primary" (click)="printDocument()">Print PDF</button>
    </div>
  </section>

  <p class="error" *ngIf="errorMessage" role="alert">{{ errorMessage }}</p>

  <section class="viewer-panel" aria-label="Generated document preview">
    <iframe
      id="documentFrame"
      title="Generated document preview"
      [src]="documentUrl">
    </iframe>
  </section>
</main>
