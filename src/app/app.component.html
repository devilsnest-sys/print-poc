<main class="shell">
  <section class="toolbar" aria-label="Document tools">
    <div class="document-meta">
      <span class="eyebrow">JSON to PDF</span>
      <h1>{{ documentTitle }}</h1>
      <p>Content, layout, page setup, and styles are generated dynamically from JSON.</p>
    </div>

    <div class="actions">
      <button type="button" class="secondary" (click)="generateDocumentFromJson()">Regenerate from JSON</button>
      <button type="button" class="secondary" (click)="resetJsonInput()">Reset JSON</button>
      <button type="button" class="secondary" (click)="openDocumentInNewTab()" [disabled]="!hasGeneratedPdf">Open preview</button>
      <button type="button" class="primary" (click)="printDocument()">Print PDF</button>
    </div>
  </section>

  <p class="error" *ngIf="errorMessage" role="alert">{{ errorMessage }}</p>

  <section class="workspace" aria-label="JSON input and generated document preview">
    <aside class="json-panel">
      <label for="jsonInput">
        <span class="eyebrow">JSON input</span>
        <strong>Update document data and styles</strong>
      </label>
      <textarea
        id="jsonInput"
        [value]="jsonInput"
        (input)="updateJsonInput($event)"
        spellcheck="false"
        aria-describedby="jsonHelp">
      </textarea>
      <p id="jsonHelp">Click Print PDF to generate and show a PDF from the latest valid JSON.</p>
    </aside>

    <section class="viewer-panel" aria-label="Generated document preview">
      <div class="empty-preview" *ngIf="!hasGeneratedPdf">
        <span class="eyebrow">PDF preview</span>
        <strong>No PDF generated yet</strong>
        <p>Click Print PDF to generate and show the document here.</p>
      </div>
      <iframe
        *ngIf="hasGeneratedPdf"
        id="documentFrame"
        title="Generated document preview"
        [src]="documentUrl">
      </iframe>
    </section>
  </section>
</main>
